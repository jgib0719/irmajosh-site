<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/secure/favicon.ico">
  <style>
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sa>
    .card{padding:2rem 3rem;border-radius:1rem;background:#111827;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{margin:0 0 .5rem 0;font-size:2rem}
    p{margin:0;opacity:.8}
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World!</h1>
    <p>irmajosh.com is freshly reset.</p>
    <div id="g_id_signin"></div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module">
    import { GSI_CLIENT_ID } from "/secure/api/config.js.php";

    // Use the global callback defined in /js/login-exchange.js
    window.onload = function () {
      google.accounts.id.initialize({
        client_id: GSI_CLIENT_ID,
        callback: window.handleCredentialResponse,
        use_fedcm_for_prompt: true
      });
      google.accounts.id.renderButton(
        document.getElementById('g_id_signin'),
        { theme: 'outline', size: 'large' }
      );
    };
  </script>
  <script src="/js/login-exchange.js?v=1756953325"></script>
</body>
</html>
